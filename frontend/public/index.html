<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Dynamic AI Chatbot — Python FastAPI + NLP" />
    <title>Dynamic AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #07090f;
        color: #c9d1d9;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar       { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #0d1117; }
      ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #58a6ff44; }
      /* Boot loader */
      #boot { position:fixed;inset:0;background:#07090f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:9999; }
      .boot-ring { width:56px;height:56px;border-radius:50%;border:3px solid #161b22;border-top-color:#58a6ff;animation:spin 0.9s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="boot">
        <div class="boot-ring"></div>
        <p style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#58a6ff;letter-spacing:2px;">BOOTING AI ENGINE...</p>
      </div>
    </div>
  </body>
</html>
